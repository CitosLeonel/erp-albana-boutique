{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-bold text-gray-900">{{ titulo }}</h1>
        <a href="{% url 'dashboard' %}"
           class="inline-flex items-center px-5 py-2.5 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
            ← Volver al Dashboard
        </a>
    </div>

    <!-- Mensajes -->
    {% if messages %}
        <div class="mb-6">
            {% for message in messages %}
                <div class="p-4 rounded-md {% if message.tags == 'success' %}bg-green-100 text-green-800{% else %}bg-red-100 text-red-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post" class="bg-white shadow sm:rounded-lg">
        {% csrf_token %}

        <div class="px-4 py-6 sm:p-8 space-y-8">
            <!-- Selección de cliente -->
            <div>
                <label for="cliente" class="block text-sm font-medium text-gray-700">Cliente</label>
                <select id="cliente" name="cliente" required class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md">
                    <option value="">Seleccionar cliente...</option>
                    {% for cliente in clientes %}
                        <option value="{{ cliente.id }}">{{ cliente.nombre }} - {{ cliente.telefono }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Líneas de productos (por ahora 1 línea fija, luego agregaremos más) -->
            <div class="border-t border-gray-200 pt-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Productos vendidos</h3>

                <!-- Línea 1 (índice 0) -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4 producto-linea" data-index="0">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Producto</label>
                        <select name="producto_0" class="producto-select mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <option value="">Seleccionar producto...</option>
                            {% for producto in productos %}
                                <option value="{{ producto.id }}">{{ producto.nombre }} - ${{ producto.precio }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Variante (talle/color)</label>
                        <select name="variante_0" class="variante-select mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <option value="">Primero selecciona producto</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Cantidad</label>
                        <input type="number" name="cantidad_0" min="1" value="1" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>

                    <div class="flex items-end">
                        <button type="button" class="remover-linea text-red-600 hover:text-red-800 hidden">
                            Eliminar
                        </button>
                    </div>
                </div>

                <!-- Botón para agregar más líneas (lo haremos dinámico después) -->
                <button type="button" id="agregar-linea" class="mt-4 inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                    + Agregar otro producto
                </button>
            </div>

            <!-- Notas -->
            <div>
                <label for="notas" class="block text-sm font-medium text-gray-700">Notas / Observaciones</label>
                <textarea id="notas" name="notas" rows="3" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
            </div>

            <!-- Total (por ahora estático, luego dinámico) -->
            <div class="pt-6 border-t border-gray-200">
                <div class="flex justify-between text-xl font-bold">
                    <span>Total estimado:</span>
                    <span id="total-venta">$0.00</span>
                </div>
            </div>
        </div>

        <div class="px-4 py-5 sm:px-6 bg-gray-50 flex justify-end space-x-4">
            <a href="{% url 'dashboard' %}" class="inline-flex items-center px-6 py-3 border border-gray-300 text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                Cancelar
            </a>
            <button type="submit" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Guardar Venta
            </button>
        </div>
    </form>
</div>

<!-- Script básico para cargar variantes cuando se selecciona producto -->
<script>
document.addEventListener('DOMContentLoaded', function () {
    const productoSelects = document.querySelectorAll('.producto-select');
    
    productoSelects.forEach(select => {
        select.addEventListener('change', function () {
            const productoId = this.value;
            const index = this.name.split('_')[1];
            const varianteSelect = document.querySelector(`select[name="variante_${index}"]`);
            
            if (!productoId) {
                varianteSelect.innerHTML = '<option value="">Primero selecciona producto</option>';
                return;
            }

            fetch(`/api/producto/${productoId}/variantes/`)  // ← Esto lo crearemos después
                .then(response => response.json())
                .then(data => {
                    varianteSelect.innerHTML = '<option value="">Seleccionar variante...</option>';
                    data.forEach(v => {
                        const option = document.createElement('option');
                        option.value = v.id;
                        option.textContent = `${v.talle} - ${v.color} (stock: ${v.stock})`;
                        varianteSelect.appendChild(option);
                    });
                });
        });
    });
});
</script>
{% endblock %}
